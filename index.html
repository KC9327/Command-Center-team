<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;

function useLocalStorage(key, init) {
  const [val, setVal] = useState(() => {
    try {
      const x = window.localStorage.getItem(key);
      return x !== null ? JSON.parse(x) : init;
    } catch(e) { return init; }
  });

  useEffect(() => {
    const handleStorage = (e) => {
      if (e.detail && e.detail.key === key) setVal(e.detail.val);
    };
    window.addEventListener("local-storage-sync", handleStorage);
    return () => window.removeEventListener("local-storage-sync", handleStorage);
  }, [key]);

  const save = (v) => {
    setVal(v);
    try { window.localStorage.setItem(key, JSON.stringify(v)); } catch(e) {}
    window.dispatchEvent(new CustomEvent("local-storage-sync", { detail: { key, val: v } }));
  };
  return [val, save];
}

const PALETTE=[
  {bg:"#F0EBEB",tx:"#7A2A3B",br:"#B06373"},{bg:"#EBECE7",tx:"#3A4533",br:"#69785D"},
  {bg:"#E8ECEF",tx:"#2A3B4C",br:"#58718A"},{bg:"#EBE6DD",tx:"#5A4222",br:"#8A704D"},
  {bg:"#F2EBE5",tx:"#6B3C2A",br:"#A36F5A"},{bg:"#EFECEF",tx:"#3A3B45",br:"#6E7182"}
];

function Tag({label,sel,onClick,bg,tx,br}){
  return <button className="tbtn" onClick={onClick} style={{background:sel?(bg||"#F0EBEB"):"transparent",color:sel?(tx||"#000"):"#4A443A",border:sel?"1.5px solid "+(br||"#7A2A3B"):"1px solid #C4BEAD",fontWeight:sel?700:400}}>{label}</button>;
}

function Dur({h,m,sh,sm}){
  return <div style={{display:"flex",gap:16,alignItems:"center"}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <span style={{fontSize:10,color:"#888375",fontWeight:700,letterSpacing:1}}>HOURS</span>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button className="sbtn" onClick={()=>sh(Math.max(0,h-1))}>-</button>
        <span style={{fontSize:22,fontWeight:700,minWidth:32,textAlign:"center",fontFamily:"'Playfair Display',serif"}}>{h}</span>
        <button className="sbtn" onClick={()=>sh(Math.min(12,h+1))}>+</button>
      </div>
    </div>
    <span style={{fontSize:24,color:"#C4BEAD",marginTop:18,fontFamily:"'Playfair Display',serif"}}>:</span>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <span style={{fontSize:10,color:"#888375",fontWeight:700,letterSpacing:1}}>MINS</span>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button className="sbtn" onClick={()=>sm(Math.max(0,m-5))}>-</button>
        <span style={{fontSize:22,fontWeight:700,minWidth:32,textAlign:"center",fontFamily:"'Playfair Display',serif"}}>{m}</span>
        <button className="sbtn" onClick={()=>sm(Math.min(55,m+5))}>+</button>
      </div>
    </div>
  </div>;
}

function AIBtn({prompt, label}){
  const [status, setStatus] = useState("idle");
  const [aiModel, setAiModel] = useLocalStorage("pref_ai_model", "chatgpt");
  const [identity] = useLocalStorage("sys_ctx", "");

  const aiLinks = {
    chatgpt: "https://chatgpt.com/", 
    gemini: "https://gemini.google.com/", 
    claude: "https://claude.ai/", 
    perplexity: "https://www.perplexity.ai/",
    grok: "https://grok.com/", 
    deepseek: "https://chat.deepseek.com/",
    manual: null // No link for manual copy
  };

  const handleBridge = async () => {
    try {
      setStatus("copying");
      const finalPrompt = `ABOUT ME / ASSISTANT PERSONA:\n${identity}\n\nDATA TO ANALYZE (${label}):\n${prompt}\n\nSTRATEGIC INSTRUCTIONS:\n1. Review the data and analyze impact.\n2. Provide insights on betterment and improvisation.\n3. End with an encouragement quote.`;
      
      // Universal Copy Logic
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(finalPrompt);
      } else {
        const textArea = document.createElement("textarea");
        textArea.value = finalPrompt; 
        document.body.appendChild(textArea);
        textArea.select(); 
        document.execCommand('copy'); 
        document.body.removeChild(textArea);
      }
      
      setStatus("copied");

      // Only open a link if it's NOT the manual copy option
      setTimeout(() => {
        if (aiLinks[aiModel]) {
          window.open(aiLinks[aiModel], "_blank");
        }
        setStatus("idle");
      }, 1500);
    } catch (err) { 
      setStatus("idle"); 
      alert("Clipboard error. Please ensure the app has permission to access the clipboard."); 
    }
  };

  return <div className="ai-bridge">
    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12}}>
      <span className="lbl" style={{marginBottom:0}}>Route To AI</span>
      <select value={aiModel} onChange={(e) => setAiModel(e.target.value)} style={{padding: "4px 8px", background: "#F8F7F2", border: "1px solid #C4BEAD", borderRadius: "4px", fontFamily: "'Merriweather', serif", fontSize: 12}}>
        <option value="chatgpt">ChatGPT</option>
        <option value="gemini">Gemini</option>
        <option value="claude">Claude</option>
        <option value="perplexity">Perplexity</option>
        <option value="grok">Grok AI</option>
        <option value="deepseek">DeepSeek</option>
        <option value="manual">📋 Manual Copy (Clipboard)</option>
      </select>
    </div>
    <button onClick={handleBridge} disabled={status !== "idle"} className="pbtn" style={{background: status === "copied" ? "#3A4533" : "#232528", marginTop: 0}}>
      {status === "idle" ? "✦ " + label : 
       aiModel === "manual" ? "✓ Copied to Clipboard" : "✓ Copied! Opening AI..."}
    </button>
    <div style={{fontSize: 11, color: "#888375", marginTop: 10, textAlign: "center", fontStyle: "italic"}}>
        100% Private. Data is packaged locally and moved to your clipboard.
    </div>
  </div>;
}

function GenericLogger({ sectionId, title, icon, tagsStr }) {
  const [entries, setEntries] = useLocalStorage(`entries_${sectionId}`, []);
  const [text, setText] = useState("");
  const [cat, setCat] = useState(null);
  const [h, setH] = useState(0);
  const [m, setM] = useState(30);
  const [time, setTime] = useState(() => {
    const n = new Date();
    return String(n.getHours()).padStart(2, "0") + ":" + String(n.getMinutes()).padStart(2, "0");
  });

  // Syncs tags directly from the Config string provided
  const categories = (tagsStr || "").split(",").map((t, i) => ({ n: t.trim(), ...PALETTE[i % PALETTE.length] })).filter(x => x.n);

  function add() {
    if (!text.trim() || !cat) return alert("Fill entry and select category");
    setEntries([...entries, { id: Date.now(), text, cat, mins: h * 60 + m, time }]);
    setText(""); setCat(null); setH(0); setM(30);
  }

  const total = entries.reduce((s, e) => s + e.mins, 0);
  const log = entries.map(e => `${e.time} | ${e.cat} | ${e.mins}m | ${e.text}`).join("\n");

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 18 }}>
        <div style={{ background: "#232528", borderRadius: 8, padding: 16, color: "#F8F7F2", textAlign: "center", borderBottom: "4px solid #7A2A3B" }}>
          <div style={{ fontSize: 28, fontFamily: "'Playfair Display',serif" }}>{entries.length}</div>
          <div style={{ fontSize: 11, color: "#C4BEAD", marginTop: 4, letterSpacing: 1 }}>ENTRIES</div>
        </div>
        <div style={{ background: "#232528", borderRadius: 8, padding: 16, color: "#F8F7F2", textAlign: "center", borderBottom: "4px solid #7A2A3B" }}>
          <div style={{ fontSize: 24, fontFamily: "'Playfair Display',serif", marginTop: 2 }}>{Math.floor(total / 60)}h {total % 60}m</div>
          <div style={{ fontSize: 11, color: "#C4BEAD", marginTop: 4, letterSpacing: 1 }}>TRACKED</div>
        </div>
      </div>
      <div className="card">
        <h3 style={{marginBottom: 10}}>{icon} {title}</h3>
        <span className="lbl">Start Time</span>
        <input type="time" value={time} onChange={e => setTime(e.target.value)} className="inp" style={{ width: "auto" }} />
        <textarea rows={2} value={text} onChange={e => setText(e.target.value)} placeholder={`Log ${title}...`} className="inp" />
        <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 12 }}>
          {categories.map(c => <Tag key={c.n} label={c.n} sel={cat === c.n} onClick={() => setCat(c.n)} bg={c.bg} tx={c.tx} br={c.br} />)}
        </div>
        <Dur h={h} m={m} sh={setH} sm={setM} />
        <button onClick={add} className="pbtn" style={{ background: "#232528" }}>+ Save to {title}</button>
      </div>
      {[...entries].reverse().map(e => {
        const c = categories.find(x => x.n === e.cat);
        return (
          <div key={e.id} className="card" style={{ borderLeft: "4px solid " + (c?.br || "#7A2A3B") }}>
            <button className="dbtn" onClick={() => setEntries(entries.filter(x => x.id !== e.id))}>×</button>
            <span style={{ fontSize: 11, fontWeight: 700 }}>{e.cat}</span>
            <div style={{ fontSize: 15, marginTop: 10 }}>{e.text}</div>
            <div style={{ fontSize: 12, color: "#888375", marginTop: 8 }}>{e.time} · {e.mins}m</div>
          </div>
        );
      })}
      {entries.length > 0 && <AIBtn label={`${title} Analysis`} prompt={log} />}
    </div>
  );
}

// Redirecting all specific tabs to the unified Master Engine
function Activity(){
  const [actStr]=useLocalStorage("sys_act","Deep work, Meetings, Commute, Break, Admin");
  return <GenericLogger sectionId="activity" title="Journal" icon="◎" tagsStr={actStr} />;
}
function Finance(){
  const [expenses,setExpenses]=useLocalStorage("fin_exp",[]); 
  const [invs,setInvs]=useLocalStorage("fin_inv",[]);
  const [expStr]=useLocalStorage("sys_exp","Food, Transport, Bills, Family, Fun, Other");
  const [invStr]=useLocalStorage("sys_inv","Skills, Health, Savings, Other");
  
  const [tab,setTab]=useState("exp");
  const [ed,setEd]=useState(""); const [ea,setEa]=useState(""); const [ec,setEc]=useState(null);
  const [id,setId]=useState(""); const [ia,setIa]=useState(""); const [ic,setIc]=useState(null);

  const ECATS = expStr.split(",").map(s=>s.trim()).filter(x=>x);
  const ICATS = invStr.split(",").map(s=>s.trim()).filter(x=>x);

  const te = expenses.reduce((s,e)=>s+parseFloat(e.a||0),0); 
  const ti = invs.reduce((s,e)=>s+parseFloat(e.a||0),0);
  
  function addE(){if(!ed||!ea||!ec)return alert("Fill all fields");setExpenses([...expenses,{id:Date.now(),d:ed,a:ea,c:ec}]);setEd("");setEa("");setEc(null);}
  function addI(){if(!id||!ia||!ic)return alert("Fill all fields");setInvs([...invs,{id:Date.now(),d:id,a:ia,c:ic}]);setId("");setIa("");setIc(null);}
  
  const log = "Expenses:\n"+expenses.map(e=>`- ${e.c}: ${e.d} ₹${e.a}`).join("\n") + "\nInvestments:\n"+invs.map(e=>`- ${e.c}: ${e.d} ₹${e.a}`).join("\n");

  return <div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
      <div className="card" style={{textAlign:"center", background:"#7A2A3B", color:"#F8F7F2", border:"none"}}>
        <div style={{fontSize:24, fontFamily:"'Playfair Display',serif"}}>Rs.{te}</div>
        <div style={{fontSize:11, marginTop:4}}>Spent today</div>
      </div>
      <div className="card" style={{textAlign:"center", background:"#3A4533", color:"#F8F7F2", border:"none"}}>
        <div style={{fontSize:24, fontFamily:"'Playfair Display',serif"}}>Rs.{ti}</div>
        <div style={{fontSize:11, marginTop:4}}>Invested today</div>
      </div>
    </div>

    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <button onClick={()=>setTab("exp")} className="pbtn" style={{flex:1, background:tab==="exp"?"#232528":"#F8F7F2", color:tab==="exp"?"#F8F7F2":"#5A544A", border:tab==="exp"?"none":"1px solid #C4BEAD", marginTop:0}}>Expense</button>
      <button onClick={()=>setTab("inv")} className="pbtn" style={{flex:1, background:tab==="inv"?"#232528":"#F8F7F2", color:tab==="inv"?"#F8F7F2":"#5A544A", border:tab==="inv"?"none":"1px solid #C4BEAD", marginTop:0}}>Investment</button>
    </div>

    <div className="card">
      <span className="lbl">Category</span>
      <div style={{display:"flex",flexWrap:"wrap",marginBottom:12}}>
        {tab==="exp" ? ECATS.map(c=><Tag key={c} label={c} sel={ec===c} onClick={()=>setEc(c)}/>) : ICATS.map(c=><Tag key={c} label={c} sel={ic===c} onClick={()=>setIc(c)} bg="#EBECE7" tx="#3A4533" br="#69785D"/>)}
      </div>
      <span className="lbl">Description</span>
      <input value={tab==="exp"?ed:id} onChange={e=>tab==="exp"?setEd(e.target.value):setId(e.target.value)} placeholder="e.g. Dmart groceries" className="inp"/>
      <span className="lbl">Amount (Rs.)</span>
      <input type="number" value={tab==="exp"?ea:ia} onChange={e=>tab==="exp"?setEa(e.target.value):setIa(e.target.value)} placeholder="0" className="inp" style={{width:120}}/>
      <button onClick={tab==="exp"?addE:addI} className="pbtn" style={{background:tab==="exp"?"#7A2A3B":"#3A4533"}}>+ Add {tab==="exp"?"expense":"investment"}</button>
    </div>

    <div className="card">
      <span className="lbl">History</span>
      {(tab==="exp"?expenses:invs).map(e=>(
        <div key={e.id} style={{display:"flex", justifyContent:"space-between", padding:"10px 0", borderBottom:"1px solid #EBE7DD"}}>
          <div style={{fontSize:14}}>{e.d} <span style={{fontSize:10, color:"#888375", marginLeft:5}}>{e.c}</span></div>
          <div style={{fontWeight:700}}>₹{e.a} <button onClick={()=>{tab==="exp"?setExpenses(expenses.filter(x=>x.id!==e.id)):setInvs(invs.filter(x=>x.id!==e.id))}} className="dbtn" style={{float:"none", marginLeft:10}}>×</button></div>
        </div>
      ))}
    </div>
    <AIBtn label="Ledger Analysis" prompt={log} />
  </div>;
}
function Gym(){
  const [gymStr]=useLocalStorage("sys_gym","Push, Pull, Legs, Core, Cardio, Rest");
  return <GenericLogger sectionId="gym" title="Training" icon="◈" tagsStr={gymStr} />;
}
function Skills(){

  return <GenericLogger sectionId="skills" title="Study" icon="◑" tagsStr={skillStr} />;
}

function Settings(){
  const [sysCtx, setSysCtx] = useLocalStorage("sys_ctx", "You are a helpful personal assistant. Keep responses direct, warm, and max 250 words.");
  const [sysAct, setSysAct] = useLocalStorage("sys_act", "Deep work, Meetings, Commute, Break, Admin");
  const [sysExp, setSysExp] = useLocalStorage("sys_exp", "Food, Transport, Bills, Family, Fun, Other");
  const [sysInv, setSysInv] = useLocalStorage("sys_inv", "Skills, Health, Savings, Other");
  const [sysGym, setSysGym] = useLocalStorage("sys_gym", "Push, Pull, Legs, Core, Cardio, Rest");
  const [sysSkill, setSysSkill] = useLocalStorage("sys_skill", "Design, Coding, Marketing, Reading");

  const [draftCtx, setDraftCtx] = useState(sysCtx);
  const [draftAct, setDraftAct] = useState(sysAct);
  const [draftExp, setDraftExp] = useState(sysExp);
  const [draftInv, setDraftInv] = useState(sysInv);
  const [draftGym, setDraftGym] = useState(sysGym);
  const [draftSkill, setDraftSkill] = useState(sysSkill);

  const hasConfigChanges = draftCtx !== sysCtx || draftAct !== sysAct || draftExp !== sysExp || draftInv !== sysInv || draftGym !== sysGym || draftSkill !== sysSkill;

  const saveSystemDefaults = () => {
    setSysCtx(draftCtx); setSysAct(draftAct); setSysExp(draftExp); setSysInv(draftInv); setSysGym(draftGym); setSysSkill(draftSkill);
    alert("Configurations Saved!");
  };

  const restoreDefaults = () => {
    if(window.confirm("Restore all tags to default values?")){
      const defaults = {
        ctx: "You are a helpful personal assistant. Keep responses direct, warm, and max 250 words.",
        act: "Deep work, Meetings, Commute, Break, Admin",
        exp: "Food, Transport, Bills, Family, Fun, Other",
        inv: "Skills, Health, Savings, Other",
        gym: "Push, Pull, Legs, Core, Cardio, Rest",
        skill: "Design, Coding, Marketing, Reading"
      };
      setDraftCtx(defaults.ctx); setSysCtx(defaults.ctx);
      setDraftAct(defaults.act); setSysAct(defaults.act);
      setDraftExp(defaults.exp); setSysExp(defaults.exp);
      setDraftInv(defaults.inv); setSysInv(defaults.inv);
      setDraftGym(defaults.gym); setSysGym(defaults.gym);
      setDraftSkill(defaults.skill); setSysSkill(defaults.skill);
      alert("Defaults Restored!");
    }
  };

  const [customTabs, setCustomTabs] = useLocalStorage("custom_tabs", "[]");
  const parsedCustom = JSON.parse(customTabs);
  const [draftCustom, setDraftCustom] = useState(parsedCustom);
  const hasCustomChanges = JSON.stringify(draftCustom) !== customTabs;

  const saveCustomTabs = () => {
    if(draftCustom.length > 4) return alert("Maximum 4 custom tabs allowed.");
    setCustomTabs(JSON.stringify(draftCustom));
    alert("Layout Saved!");
  };

  const exportData = () => {
    const allData = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      allData[key] = localStorage.getItem(key);
    }
    const blob = new Blob([JSON.stringify(allData)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "Chronicles_Backup.json"; a.click();
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {

      <span className="lbl">Ledger — Investment Tags</span>
      <input value={draftInv} onChange={e=>setDraftInv(e.target.value)} className="inp"/>

      <input value={draftGym} onChange={e=>setDraftGym(e.target.value)} className="inp"/>

      <div style={{display:"flex", gap:8}}>

            <input value={t.label} onChange={e=>{const n=[...draftCustom]; n[idx].label=e.target.value; setDraftCustom(n);}} className="inp" style={{marginBottom:0}}/>
            <button onClick={()=>setDraftCustom(draftCustom.filter(x=>x.id!==t.id))} style={{color:"#FF3B30", border:"none", background:"none", fontSize:20, cursor:"pointer"}}>x</button>

      {hasCustomChanges && <button onClick={saveCustomTabs} className="pbtn" style={{marginTop:12}}>Save Layout</button>}

    {/* SECTION 3 — ARCHIVE */}

function Prophecy(){
  const [timeframe, setTimeframe] = useState("1 week");
  const [mode, setMode] = useState("both");
  const [status, setStatus] = useState("idle");
  const [aiModel, setAiModel] = useLocalStorage("pref_ai_model", "chatgpt");
  const [identity] = useLocalStorage("sys_ctx", "");

  // Pull all logs from localStorage
  const actEntries = JSON.parse(localStorage.getItem("entries_activity") || "[]");
  const gymEntries = JSON.parse(localStorage.getItem("entries_gym") || "[]");
  const skillEntries = JSON.parse(localStorage.getItem("entries_skills") || "[]");
  const finExp = JSON.parse(localStorage.getItem("fin_exp") || "[]");
  const finInv = JSON.parse(localStorage.getItem("fin_inv") || "[]");

  const aiLinks = {
    chatgpt: "https://chatgpt.com/",
    gemini: "https://gemini.google.com/",
    claude: "https://claude.ai/",
    perplexity: "https://www.perplexity.ai/",
    grok: "https://grok.com/",
    deepseek: "https://chat.deepseek.com/",
    manual: null
  };

  const TIMEFRAMES = ["1 Day", "1 Week", "1 Month", "1 Year"];
  const MODES = [
    { id: "current", label: "⚠️ Current Path", desc: "If nothing changes" },
    { id: "heroic", label: "🦁 Heroic Path", desc: "If you level up" },
    { id: "both", label: "🎬 Full Movie", desc: "Both paths, cinematic" },
  ];

  const totalTracked = [
    ...actEntries.map(e => ({ type: "Activity", ...e })),
    ...gymEntries.map(e => ({ type: "Training", ...e })),
    ...skillEntries.map(e => ({ type: "Study", ...e })),
  ];

  const uniqueDays = [...new Set(totalTracked.map(e => e.time?.slice(0,5)))].length;
const hasData = timeframe === "1 Day" ? totalTracked.length > 0 :
                timeframe === "1 Week" ? uniqueDays >= 3 :
                timeframe === "1 Month" ? uniqueDays >= 7 :
                uniqueDays >= 30;
const lockMsg = timeframe === "1 Day" ? "Log some activity first" :
                timeframe === "1 Week" ? `Need 3+ days of logs (you have ${uniqueDays})` :
                timeframe === "1 Month" ? `Need 7+ days of logs (you have ${uniqueDays})` :
                `Need 30+ days of logs (you have ${uniqueDays})`;

  const buildPrompt = () => {
    const logSummary = totalTracked.length > 0
      ? totalTracked.map(e => `[${e.type}] ${e.time || ""} | ${e.cat} | ${e.mins}m | ${e.text}`).join("\n")
      : "No activity logs yet.";

    const finSummary = finExp.length > 0
      ? `Expenses: ${finExp.map(e => `${e.c}: Rs.${e.a}`).join(", ")}\nInvestments: ${finInv.map(e => `${e.c}: Rs.${e.a}`).join(", ") || "None"}`
      : "No financial logs yet.";

    const modeInstructions = {
      current: `Write ONLY the "Current Path" — a short, vivid, present-tense narrative story of what this person's life looks like ${timeframe} from now if nothing changes. Write like a novelist, not a coach. No bullet points. No video or film language. Pure prose, 3 paragraphs max.`,
      heroic: `Write ONLY the "Heroic Path" — a short, vivid, present-tense narrative story of what this person's life looks like ${timeframe} from now if they make the right changes. Write like a novelist, not a coach. No bullet points. No video or film language. Pure prose, 3 paragraphs max.`,
      both: `Write two short narrative stories in present tense:

CURRENT PATH — what life looks like ${timeframe} from now if nothing changes. Honest, specific, no sugarcoating.

HEROIC PATH — what life looks like ${timeframe} from now if they make the right changes. Earned, real, not fantasy.

End with THE 3 PIVOTS — the exact 3 actions that decide which story becomes real.

Write like a novelist. No bullet points. No video or film language. Pure prose.`
    };

    return `ABOUT ME:\n${identity || "A disciplined person working toward their goals."}\n\nMY LOGS (Recent Activity):\n${logSummary}\n\nMY FINANCES:\n${finSummary}\n\nPROPHECY REQUEST — ${timeframe.toUpperCase()} FROM NOW:\n\n${modeInstructions[mode]}\n\nSTYLE RULES:\n- Write like a movie narrator. Present tense. Vivid scenes.\n- Use specific details from the logs (actual categories, times, patterns).\n- Each scene: 3-4 punchy paragraphs max.\n- Make the person FEEL it, not just read it.\n- End with 1 powerful line that stays with them.`;
  };

  const generate = async () => {
    if (!hasData) return alert("Log some activities first to generate your prophecy.");
    try {
      setStatus("copying");
      const prompt = buildPrompt();
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(prompt);
      } else {
        const t = document.createElement("textarea");
        t.value = prompt;
        document.body.appendChild(t);
        t.select();
        document.execCommand("copy");
        document.body.removeChild(t);
      }
      setStatus("copied");
      setTimeout(() => {
        if (aiLinks[aiModel]) window.open(aiLinks[aiModel], "_blank");
        setStatus("idle");
      }, 1500);
    } catch (e) {
      setStatus("idle");
      alert("Clipboard error.");
    }
  };

  const patternInsights = () => {
    if (totalTracked.length === 0) return [];
    const catCount = {};
    totalTracked.forEach(e => { catCount[e.cat] = (catCount[e.cat] || 0) + 1; });
    const sorted = Object.entries(catCount).sort((a, b) => b[1] - a[1]);
    return sorted.slice(0, 3);
  };

  const patterns = patternInsights();
  const totalMins = totalTracked.reduce((s, e) => s + (e.mins || 0), 0);

  return (
    <div>
      {/* HEADER CARD */}
      <div className="card" style={{background: "linear-gradient(135deg, #1C1C1E 0%, #2C2C2E 100%)", border: "none", textAlign: "center", padding: 28}}>
        <div style={{fontSize: 48, marginBottom: 8}}>🎬</div>
        <h2 style={{color: "#F2F2F7", fontSize: 24, marginBottom: 6}}>Life Prophecy</h2>
        <p style={{color: "#8E8E93", fontSize: 13, lineHeight: 1.6}}>
          Based on your logs, the AI writes a cinematic scene of your future — two paths, your choice.
        </p>
      </div>

      {/* LOG SNAPSHOT */}
      <div className="card">
        <span className="lbl">Your Log Snapshot</span>
        {!hasData ? (
          <p style={{fontSize: 13, color: "#8E8E93", fontStyle: "italic", textAlign: "center", padding: "12px 0"}}>
            No logs found. Start logging your activities, finances, gym, and study sessions first.
          </p>
        ) : (
          <div>
            <div style={{display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 14}}>
              <div style={{background: "#F2F2F7", borderRadius: 16, padding: 12, textAlign: "center"}}>
                <div style={{fontSize: 22, fontWeight: 800, color: "#1C1C1E"}}>{totalTracked.length}</div>
                <div style={{fontSize: 10, color: "#8E8E93", marginTop: 2}}>ENTRIES</div>
              </div>
              <div style={{background: "#F2F2F7", borderRadius: 16, padding: 12, textAlign: "center"}}>
                <div style={{fontSize: 18, fontWeight: 800, color: "#1C1C1E"}}>{Math.floor(totalMins/60)}h {totalMins%60}m</div>
                <div style={{fontSize: 10, color: "#8E8E93", marginTop: 2}}>TRACKED</div>
              </div>
              <div style={{background: "#F2F2F7", borderRadius: 16, padding: 12, textAlign: "center"}}>
                <div style={{fontSize: 22, fontWeight: 800, color: "#1C1C1E"}}>{finExp.length}</div>
                <div style={{fontSize: 10, color: "#8E8E93", marginTop: 2}}>EXPENSES</div>
              </div>
            </div>
            {patterns.length > 0 && (
              <div>
                <span className="lbl">Top Patterns Detected</span>
                {patterns.map(([cat, count]) => (
                  <div key={cat} style={{display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #F2F2F7"}}>
                    <span style={{fontSize: 14}}>{cat}</span>
                    <span style={{fontSize: 13, fontWeight: 700, color: "#5E5CE6"}}>{count}x logged</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* TIMEFRAME SELECTOR */}
      <div className="card">
        <span className="lbl">Prophecy Timeframe</span>
        <div style={{display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 20}}>
          {TIMEFRAMES.map(t => (
            <button key={t} onClick={() => setTimeframe(t)}
              style={{padding: "12px 4px", borderRadius: 14, border: timeframe === t ? "2px solid #5E5CE6" : "1.5px solid #E5E5EA", background: timeframe === t ? "#5E5CE6" : "#F2F2F7", color: timeframe === t ? "#fff" : "#3A3A3C", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "'Outfit', sans-serif"}}>
              {t}
            </button>
          ))}
        </div>

        <span className="lbl">Prophecy Mode</span>
        <div style={{display: "flex", flexDirection: "column", gap: 10, marginBottom: 20}}>
          {MODES.map(md => (
            <button key={md.id} onClick={() => setMode(md.id)}
              style={{padding: "14px 16px", borderRadius: 16, border: mode === md.id ? "2px solid #5E5CE6" : "1.5px solid #E5E5EA", background: mode === md.id ? "#EEF0FF" : "#F2F2F7", textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center"}}>
              <div>
                <div style={{fontSize: 15, fontWeight: 700, color: mode === md.id ? "#5E5CE6" : "#1C1C1E", fontFamily: "'Outfit', sans-serif"}}>{md.label}</div>
                <div style={{fontSize: 12, color: "#8E8E93", marginTop: 2}}>{md.desc}</div>
              </div>
              {mode === md.id && <span style={{fontSize: 18}}>✓</span>}
            </button>
          ))}
        </div>

        <span className="lbl">Route To AI</span>
        <select value={aiModel} onChange={e => setAiModel(e.target.value)}
          style={{width: "100%", padding: "12px 14px", background: "#F2F2F7", border: "none", borderRadius: 14, fontFamily: "'Inter', sans-serif", fontSize: 14, marginBottom: 16, outline: "none"}}>
          <option value="chatgpt">ChatGPT</option>
          <option value="gemini">Gemini</option>
          <option value="claude">Claude</option>
          <option value="perplexity">Perplexity</option>
          <option value="grok">Grok AI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="manual">📋 Manual Copy</option>
        </select>

        <button onClick={generate} disabled={status !== "idle" || !hasData}
  style={{width:"100%", padding:18, borderRadius:18, border:"none", background:status==="copied"?"#3A4533":"linear-gradient(135deg, #5E5CE6, #BF5AF2)", color:"#fff", fontSize:16, fontWeight:800, cursor:!hasData?"not-allowed":"pointer", fontFamily:"'Outfit', sans-serif", opacity:!hasData?0.5:1, boxShadow:"0 6px 20px rgba(94,92,230,0.35)"}}>
  {status==="idle" ? "🎬 Generate Prophecy" : status==="copying" ? "Packaging your story..." : "✓ Copied! Opening AI..."}
</button>
{!hasData ? <div style={{color:"#FF3B30",fontSize:12,marginTop:8,textAlign:"center"}}>{lockMsg}</div> : <div style={{fontSize:11,color:"#8E8E93",marginTop:10,textAlign:"center",fontStyle:"italic"}}>
  100% Private. Your logs are packaged locally and sent to your clipboard.
</div>
}

      {/* HOW IT WORKS */}
      <div className="card" style={{background: "#F2F2F7", border: "none"}}>
        <span className="lbl">How It Works</span>
        {[
          ["📝", "Log your day", "Activities, finance, gym, study — the more you log, the sharper the prophecy"],
          ["🎬", "Choose timeframe", "1 day for tomorrow's preview, 1 year for the big vision"],
          ["🤖", "AI writes your story", "Copied to clipboard, opens your chosen AI in one tap"],
          ["🔁", "Two paths shown", "Current path vs Heroic path — and the 3 pivots that decide"]
        ].map(([icon, title, desc]) => (
          <div key={title} style={{display: "flex", gap: 14, marginBottom: 16, alignItems: "flex-start"}}>
            <span style={{fontSize: 24}}>{icon}</span>
            <div>
              <div style={{fontSize: 14, fontWeight: 700, marginBottom: 2}}>{title}</div>
              <div style={{fontSize: 12, color: "#8E8E93", lineHeight: 1.5}}>{desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

           t.id === "gym" ? <Gym/> :
           t.id === "skills" ? <Skills/> :
           t.id === "prophecy" ? <Prophecy/> :
           t.id === "settings" ? <Settings/> :
           <GenericLogger sectionId={t.id} title={t.label} icon={t.icon} tagsStr={t.tags}/>}
        </div>
      ))}
    </div>

    <div className="nav">
      {navTabs.map(t => (
        <button key={t.id} className="nb" onClick={() => handleNav(t.id)}>
          <span style={{fontSize: t.id==="more"?16:22, color: (tab===t.id||(t.id==="more"&&showMore)) ? "#5E5CE6" : "#C7C7CC"}}>{t.icon}</span>
          <span style={{fontSize:10, fontWeight:700, color:(tab===t.id||(t.id==="more"&&showMore))?"#5E5CE6":"#C7C7CC"}}>{t.label}</span>
        </button>
      ))}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
