body{font-family:'Inter',sans-serif;background:#F2F2F7;padding-bottom:100px;color:#1C1C1E; overflow-x:hidden;}
.card{background:#FFFFFF;border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,0,0,0.04); border:none; transition:transform 0.2s ease;}

h1,h2,h3,h4{font-family:'Outfit',sans-serif;color:#1C1C1E;font-weight:800;}

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect} = React;

function useLocalStorage(key, init) {
  const [val, setVal] = useState(() => {
    try {
      const x = window.localStorage.getItem(key);
      return x !== null ? JSON.parse(x) : init;
    } catch(e) { return init; }
  });

  useEffect(() => {
    const handleStorage = (e) => {
      if (e.detail && e.detail.key === key) setVal(e.detail.val);
    };
    window.addEventListener("local-storage-sync", handleStorage);
    return () => window.removeEventListener("local-storage-sync", handleStorage);
  }, [key]);

  const save = (v) => {
    setVal(v);
    try { window.localStorage.setItem(key, JSON.stringify(v)); } catch(e) {}
    window.dispatchEvent(new CustomEvent("local-storage-sync", { detail: { key, val: v } }));
  };
  return [val, save];
}

const PALETTE=[
  {bg:"#F0EBEB",tx:"#7A2A3B",br:"#B06373"},{bg:"#EBECE7",tx:"#3A4533",br:"#69785D"},
  {bg:"#E8ECEF",tx:"#2A3B4C",br:"#58718A"},{bg:"#EBE6DD",tx:"#5A4222",br:"#8A704D"},
  {bg:"#F2EBE5",tx:"#6B3C2A",br:"#A36F5A"},{bg:"#EFECEF",tx:"#3A3B45",br:"#6E7182"}
];

function Tag({label,sel,onClick,bg,tx,br}){
  return <button className="tbtn" onClick={onClick} style={{background:sel?(bg||"#F0EBEB"):"transparent",color:sel?(tx||"#000"):"#4A443A",border:sel?"1.5px solid "+(br||"#7A2A3B"):"1px solid #C4BEAD",fontWeight:sel?700:400}}>{label}</button>;
}

function Dur({h,m,sh,sm}){
  return <div style={{display:"flex",gap:16,alignItems:"center"}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <span style={{fontSize:10,color:"#888375",fontWeight:700,letterSpacing:1}}>HOURS</span>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button className="sbtn" onClick={()=>sh(Math.max(0,h-1))}>-</button>
        <span style={{fontSize:22,fontWeight:700,minWidth:32,textAlign:"center",fontFamily:"'Playfair Display',serif"}}>{h}</span>
        <button className="sbtn" onClick={()=>sh(Math.min(12,h+1))}>+</button>
      </div>
    </div>
    <span style={{fontSize:24,color:"#C4BEAD",marginTop:18,fontFamily:"'Playfair Display',serif"}}>:</span>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <span style={{fontSize:10,color:"#888375",fontWeight:700,letterSpacing:1}}>MINS</span>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button className="sbtn" onClick={()=>sm(Math.max(0,m-5))}>-</button>
        <span style={{fontSize:22,fontWeight:700,minWidth:32,textAlign:"center",fontFamily:"'Playfair Display',serif"}}>{m}</span>
        <button className="sbtn" onClick={()=>sm(Math.min(55,m+5))}>+</button>
      </div>
    </div>
  </div>;
}

function AIBtn({prompt, label}){
  const [status, setStatus] = useState("idle");
  const [aiModel, setAiModel] = useLocalStorage("pref_ai_model", "chatgpt");
  const [identity] = useLocalStorage("sys_ctx", "");

  const aiLinks = {
    chatgpt: "https://chatgpt.com/", 
    gemini: "https://gemini.google.com/", 
    claude: "https://claude.ai/", 
    perplexity: "https://www.perplexity.ai/",
    grok: "https://grok.com/", 
    deepseek: "https://chat.deepseek.com/",
    manual: null // No link for manual copy
  };

  const handleBridge = async () => {
    try {
      setStatus("copying");
      const finalPrompt = `ABOUT ME / ASSISTANT PERSONA:\n${identity}\n\nDATA TO ANALYZE (${label}):\n${prompt}\n\nSTRATEGIC INSTRUCTIONS:\n1. Review the data and analyze impact.\n2. Provide insights on betterment and improvisation.\n3. End with an encouragement quote.`;
      
      // Universal Copy Logic
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(finalPrompt);
      } else {
        const textArea = document.createElement("textarea");
        textArea.value = finalPrompt; 
        document.body.appendChild(textArea);
        textArea.select(); 
        document.execCommand('copy'); 
        document.body.removeChild(textArea);
      }
      
      setStatus("copied");

      // Only open a link if it's NOT the manual copy option
      setTimeout(() => {
        if (aiLinks[aiModel]) {
          window.open(aiLinks[aiModel], "_blank");
        }
        setStatus("idle");
      }, 1500);
    } catch (err) { 
      setStatus("idle"); 
      alert("Clipboard error. Please ensure the app has permission to access the clipboard."); 
    }
  };

  return <div className="ai-bridge">
    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12}}>
      <span className="lbl" style={{marginBottom:0}}>Route To AI</span>
      <select value={aiModel} onChange={(e) => setAiModel(e.target.value)} style={{padding: "4px 8px", background: "#F8F7F2", border: "1px solid #C4BEAD", borderRadius: "4px", fontFamily: "'Merriweather', serif", fontSize: 12}}>
        <option value="chatgpt">ChatGPT</option>
        <option value="gemini">Gemini</option>
        <option value="claude">Claude</option>
        <option value="perplexity">Perplexity</option>
        <option value="grok">Grok AI</option>
        <option value="deepseek">DeepSeek</option>
        <option value="manual">📋 Manual Copy (Clipboard)</option>
      </select>
    </div>
    <button onClick={handleBridge} disabled={status !== "idle"} className="pbtn" style={{background: status === "copied" ? "#3A4533" : "#232528", marginTop: 0}}>
      {status === "idle" ? "✦ " + label : 
       aiModel === "manual" ? "✓ Copied to Clipboard" : "✓ Copied! Opening AI..."}
    </button>
    <div style={{fontSize: 11, color: "#888375", marginTop: 10, textAlign: "center", fontStyle: "italic"}}>
        100% Private. Data is packaged locally and moved to your clipboard.
    </div>
  </div>;
}

function GenericLogger({ sectionId, title, icon, tagsStr }) {
  const [entries, setEntries] = useLocalStorage(`entries_${sectionId}`, []);
  const [text, setText] = useState("");
  const [cat, setCat] = useState(null);
  const [h, setH] = useState(0);
  const [m, setM] = useState(30);
  const [time, setTime] = useState(() => {
    const n = new Date();
    return String(n.getHours()).padStart(2, "0") + ":" + String(n.getMinutes()).padStart(2, "0");
  });

  // Syncs tags directly from the Config string provided
  const categories = (tagsStr || "").split(",").map((t, i) => ({ n: t.trim(), ...PALETTE[i % PALETTE.length] })).filter(x => x.n);

  function add() {
    if (!text.trim() || !cat) return alert("Fill entry and select category");
    setEntries([...entries, { id: Date.now(), text, cat, mins: h * 60 + m, time }]);
    setText(""); setCat(null); setH(0); setM(30);
  }

  const total = entries.reduce((s, e) => s + e.mins, 0);
  const log = entries.map(e => `${e.time} | ${e.cat} | ${e.mins}m | ${e.text}`).join("\n");

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 18 }}>
        <div style={{ background: "#232528", borderRadius: 8, padding: 16, color: "#F8F7F2", textAlign: "center", borderBottom: "4px solid #7A2A3B" }}>
          <div style={{ fontSize: 28, fontFamily: "'Playfair Display',serif" }}>{entries.length}</div>
          <div style={{ fontSize: 11, color: "#C4BEAD", marginTop: 4, letterSpacing: 1 }}>ENTRIES</div>
        </div>
        <div style={{ background: "#232528", borderRadius: 8, padding: 16, color: "#F8F7F2", textAlign: "center", borderBottom: "4px solid #7A2A3B" }}>
          <div style={{ fontSize: 24, fontFamily: "'Playfair Display',serif", marginTop: 2 }}>{Math.floor(total / 60)}h {total % 60}m</div>
          <div style={{ fontSize: 11, color: "#C4BEAD", marginTop: 4, letterSpacing: 1 }}>TRACKED</div>
        </div>
      </div>
      <div className="card">
        <h3 style={{marginBottom: 10}}>{icon} {title}</h3>
        <span className="lbl">Start Time</span>
        <input type="time" value={time} onChange={e => setTime(e.target.value)} className="inp" style={{ width: "auto" }} />
        <textarea rows={2} value={text} onChange={e => setText(e.target.value)} placeholder={`Log ${title}...`} className="inp" />
        <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 12 }}>
          {categories.map(c => <Tag key={c.n} label={c.n} sel={cat === c.n} onClick={() => setCat(c.n)} bg={c.bg} tx={c.tx} br={c.br} />)}
        </div>
        <Dur h={h} m={m} sh={setH} sm={setM} />
        <button onClick={add} className="pbtn" style={{ background: "#232528" }}>+ Save to {title}</button>
      </div>
      {[...entries].reverse().map(e => {
        const c = categories.find(x => x.n === e.cat);
        return (
          <div key={e.id} className="card" style={{ borderLeft: "4px solid " + (c?.br || "#7A2A3B") }}>
            <button className="dbtn" onClick={() => setEntries(entries.filter(x => x.id !== e.id))}>×</button>
            <span style={{ fontSize: 11, fontWeight: 700 }}>{e.cat}</span>
            <div style={{ fontSize: 15, marginTop: 10 }}>{e.text}</div>
            <div style={{ fontSize: 12, color: "#888375", marginTop: 8 }}>{e.time} · {e.mins}m</div>
          </div>
        );
      })}
      {entries.length > 0 && <AIBtn label={`${title} Analysis`} prompt={log} />}
    </div>
  );
}

// Redirecting all specific tabs to the unified Master Engine
function Activity(){
  const [actStr]=useLocalStorage("sys_act","Deep work, Meetings, Admin");
  return <GenericLogger sectionId="activity" title="Journal" icon="◎" tagsStr={actStr} />;
}
function Finance(){
  const [expenses,setExpenses]=useLocalStorage("fin_exp",[]); 
  const [invs,setInvs]=useLocalStorage("fin_inv",[]);
  const [expStr]=useLocalStorage("sys_exp","Food, Transport, Bills, Family, Fun, Other");
  const [invStr]=useLocalStorage("sys_inv","Skills, Health, Savings, Other");
  
  const [tab,setTab]=useState("exp");
  const [ed,setEd]=useState(""); const [ea,setEa]=useState(""); const [ec,setEc]=useState(null);
  const [id,setId]=useState(""); const [ia,setIa]=useState(""); const [ic,setIc]=useState(null);

  const ECATS = expStr.split(",").map(s=>s.trim()).filter(x=>x);
  const ICATS = invStr.split(",").map(s=>s.trim()).filter(x=>x);

  const te = expenses.reduce((s,e)=>s+parseFloat(e.a||0),0); 
  const ti = invs.reduce((s,e)=>s+parseFloat(e.a||0),0);
  
  function addE(){if(!ed||!ea||!ec)return alert("Fill all fields");setExpenses([...expenses,{id:Date.now(),d:ed,a:ea,c:ec}]);setEd("");setEa("");setEc(null);}
  function addI(){if(!id||!ia||!ic)return alert("Fill all fields");setInvs([...invs,{id:Date.now(),d:id,a:ia,c:ic}]);setId("");setIa("");setIc(null);}
  
  const log = "Expenses:\n"+expenses.map(e=>`- ${e.c}: ${e.d} ₹${e.a}`).join("\n") + "\nInvestments:\n"+invs.map(e=>`- ${e.c}: ${e.d} ₹${e.a}`).join("\n");

  return <div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
      <div className="card" style={{textAlign:"center", background:"#7A2A3B", color:"#F8F7F2", border:"none"}}>
        <div style={{fontSize:24, fontFamily:"'Playfair Display',serif"}}>Rs.{te}</div>
        <div style={{fontSize:11, marginTop:4}}>Spent today</div>
      </div>
      <div className="card" style={{textAlign:"center", background:"#3A4533", color:"#F8F7F2", border:"none"}}>
        <div style={{fontSize:24, fontFamily:"'Playfair Display',serif"}}>Rs.{ti}</div>
        <div style={{fontSize:11, marginTop:4}}>Invested today</div>
      </div>
    </div>

    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <button onClick={()=>setTab("exp")} className="pbtn" style={{flex:1, background:tab==="exp"?"#232528":"#F8F7F2", color:tab==="exp"?"#F8F7F2":"#5A544A", border:tab==="exp"?"none":"1px solid #C4BEAD", marginTop:0}}>Expense</button>
      <button onClick={()=>setTab("inv")} className="pbtn" style={{flex:1, background:tab==="inv"?"#232528":"#F8F7F2", color:tab==="inv"?"#F8F7F2":"#5A544A", border:tab==="inv"?"none":"1px solid #C4BEAD", marginTop:0}}>Investment</button>
    </div>

    <div className="card">
      <span className="lbl">Category</span>
      <div style={{display:"flex",flexWrap:"wrap",marginBottom:12}}>
        {tab==="exp" ? ECATS.map(c=><Tag key={c} label={c} sel={ec===c} onClick={()=>setEc(c)}/>) : ICATS.map(c=><Tag key={c} label={c} sel={ic===c} onClick={()=>setIc(c)} bg="#EBECE7" tx="#3A4533" br="#69785D"/>)}
      </div>
      <span className="lbl">Description</span>
      <input value={tab==="exp"?ed:id} onChange={e=>tab==="exp"?setEd(e.target.value):setId(e.target.value)} placeholder="e.g. Dmart groceries" className="inp"/>
      <span className="lbl">Amount (Rs.)</span>
      <input type="number" value={tab==="exp"?ea:ia} onChange={e=>tab==="exp"?setEa(e.target.value):setIa(e.target.value)} placeholder="0" className="inp" style={{width:120}}/>
      <button onClick={tab==="exp"?addE:addI} className="pbtn" style={{background:tab==="exp"?"#7A2A3B":"#3A4533"}}>+ Add {tab==="exp"?"expense":"investment"}</button>
    </div>

    <div className="card">
      <span className="lbl">History</span>
      {(tab==="exp"?expenses:invs).map(e=>(
        <div key={e.id} style={{display:"flex", justifyContent:"space-between", padding:"10px 0", borderBottom:"1px solid #EBE7DD"}}>
          <div style={{fontSize:14}}>{e.d} <span style={{fontSize:10, color:"#888375", marginLeft:5}}>{e.c}</span></div>
          <div style={{fontWeight:700}}>₹{e.a} <button onClick={()=>{tab==="exp"?setExpenses(expenses.filter(x=>x.id!==e.id)):setInvs(invs.filter(x=>x.id!==e.id))}} className="dbtn" style={{float:"none", marginLeft:10}}>×</button></div>
        </div>
      ))}
    </div>
    <AIBtn label="Ledger Analysis" prompt={log} />
  </div>;
}
function Gym(){
  const [gymStr]=useLocalStorage("sys_gym","Push, Pull, Legs, Core, Cardio, Rest");
  return <GenericLogger sectionId="gym" title="Training" icon="◈" tagsStr={gymStr} />;
}
function Skills(){
  const [skillStr]=useLocalStorage("sys_skill","Design, Coding, Marketing, Reading");
  return <GenericLogger sectionId="skills" title="Study" icon="◑" tagsStr={skillStr} />;
}

function Settings(){
  const [sysCtx, setSysCtx] = useLocalStorage("sys_ctx", "You are a helpful personal assistant. Keep responses direct, warm, and max 250 words.");
  const [sysAct, setSysAct] = useLocalStorage("sys_act", "Deep work, Meetings, Commute, Break, Admin");
  const [sysExp, setSysExp] = useLocalStorage("sys_exp", "Food, Transport, Bills, Family, Fun, Other");
  const [sysInv, setSysInv] = useLocalStorage("sys_inv", "Skills, Health, Savings, Other");
  const [sysGym, setSysGym] = useLocalStorage("sys_gym", "Push, Pull, Legs, Core, Cardio, Rest");
  const [sysSkill, setSysSkill] = useLocalStorage("sys_skill", "Design, Coding, Marketing, Reading");
  
  const [draftCtx, setDraftCtx] = useState(sysCtx);
  const [draftAct, setDraftAct] = useState(sysAct);
  const [draftExp, setDraftExp] = useState(sysExp);
  const [draftInv, setDraftInv] = useState(sysInv);
  const [draftGym, setDraftGym] = useState(sysGym);
  const [draftSkill, setDraftSkill] = useState(sysSkill);

  const hasConfigChanges = draftCtx !== sysCtx || draftAct !== sysAct || draftExp !== sysExp || draftInv !== sysInv || draftGym !== sysGym || draftSkill !== sysSkill;

  const saveSystemDefaults = () => {
    setSysCtx(draftCtx); setSysAct(draftAct); setSysExp(draftExp); setSysInv(draftInv); setSysGym(draftGym); setSysSkill(draftSkill);
    alert("✅ Configurations Saved!");
  };

  const [tabsStr, setTabsStr] = useLocalStorage("sys_tabs", JSON.stringify(DEFAULT_TABS));
  const [draftTabs, setDraftTabs] = useState(() => JSON.parse(tabsStr));
  const hasTabChanges = JSON.stringify(draftTabs) !== tabsStr;

  const saveTabs = () => {
    const finalTabs = draftTabs.filter(t => t.id !== "settings");
    finalTabs.push({ id: "settings", icon: "⚙", label: "Config" });
    setTabsStr(JSON.stringify(finalTabs));
    alert("✅ Layout Saved!");
  };

  const resetToDefaults = () => {
    if(window.confirm("Restore original tabs?")){
      setDraftTabs(DEFAULT_TABS); setTabsStr(JSON.stringify(DEFAULT_TABS)); window.location.reload();
    }
  };

  const exportData = () => {
    const allData = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      allData[key] = localStorage.getItem(key);
    }
    const blob = new Blob([JSON.stringify(allData)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `Chronicles_Backup.json`; a.click();
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        Object.keys(data).forEach(key => { localStorage.setItem(key, data[key]); });
        alert("✅ Archives Restored!"); window.location.reload();
      } catch (err) { alert("❌ Invalid archive."); }
    };
    reader.readAsText(file);
  };
  
  return <div>
    <div className="card" style={{textAlign: "center", border: "1.5px dashed #C7C7CC"}}>
      <h3 style={{marginBottom:8, fontSize: "20px"}}>Archive Protection</h3>
      <p style={{fontSize: 11, color: "#8E8E93", marginBottom: 15, fontStyle: "italic"}}>
        💡 Tip: Export often to keep a backup. Import to restore your data on any device.
      </p>
      <div style={{display:"flex", gap:8}}>
        <button onClick={exportData} className="pbtn" style={{flex:1, marginTop:0}}>📥 Export Archive</button>
        <button onClick={() => { if(window.confirm("Erase all data?")){ localStorage.clear(); window.location.reload(); } }} className="pbtn" style={{flex:1, background:"#FF3B30", marginTop:0}}>🗑️ Reset App</button>
      </div>
      <div style={{marginTop: 18, borderTop: "1px dashed #D9D4C5", paddingTop: 14}}>
        <input type="file" accept=".json" onChange={importData} style={{fontSize: "12px", width: "100%"}}/>
      </div>
    </div>

    <div className="card">
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:15}}>
        <h3 style={{fontSize:20}}>Activity Sections</h3>
        <span style={{fontSize:11, color: "#8E8E93", fontWeight:700}}>{draftTabs.length}/6 SLOTS</span>
      </div>
      <p style={{fontSize: 11, color: "#8E8E93", marginBottom: 12, fontStyle: "italic"}}>
        💡 Walkthrough: Customize your icons, names, and tags for each section below.
      </p>
      {draftTabs.map((t, idx) => (
        <div key={t.id} style={{marginBottom: 16, padding: "14px", background: "#F2F2F7", borderRadius: 16}}>
          <div style={{display: "flex", gap: 8, marginBottom: 8}}>
            <input value={t.icon} onChange={e => { const n = [...draftTabs]; n[idx].icon = e.target.value; setDraftTabs(n); }} className="inp" style={{width: 55, textAlign: "center", marginBottom: 0}} />
            <input value={t.label} onChange={e => { const n = [...draftTabs]; n[idx].label = e.target.value; setDraftTabs(n); }} className="inp" style={{marginBottom: 0}} disabled={t.id === "settings"} />
            {t.id !== "settings" && <button onClick={() => setDraftTabs(draftTabs.filter(x => x.id !== t.id))} style={{color: "#C7C7CC", border: "none", background: "none", fontSize:20}}>×</button>}
          </div>
          <span className="lbl" style={{fontSize: 9, marginBottom: 4}}>Section Tags (For Custom Tabs)</span>
          <input value={t.tags || ""} onChange={e => { const n = [...draftTabs]; n[idx].tags = e.target.value; setDraftTabs(n); }} className="inp" style={{marginBottom: 0, padding: 10, fontSize: 13}} placeholder="e.g. Prayer, Meditation..." />
        </div>
      ))}
      {draftTabs.length < 6 && (
        <button onClick={() => setDraftTabs([...draftTabs, { id: "tab_"+Date.now(), icon: "📝", label: "New Tab", tags: "General" }])} className="pbtn" style={{background: "transparent", color: "#5E5CE6", border: "1.5px solid #5E5CE6", boxShadow: "none"}}>+ Add New Tab Slot</button>
      )}
      {hasTabChanges && <button onClick={saveTabs} className="pbtn" style={{marginTop: 14}}>💾 Save Layout</button>}
    </div>

    <div className="card" style={{marginTop: 20}}>
      <h3 style={{marginBottom:15, fontSize:20}}>System Defaults & Persona</h3>
      <span className="lbl">Assistant Persona Rules</span>
      <textarea rows={3} value={draftCtx} onChange={e=>setDraftCtx(e.target.value)} className="inp" />
      <span className="lbl">Journal Tags</span>
      <input value={draftAct} onChange={e=>setDraftAct(e.target.value)} className="inp"/>
      <span className="lbl">Ledger: Expense Tags</span>
      <input value={draftExp} onChange={e=>setDraftExp(e.target.value)} className="inp"/>
      <span className="lbl">Ledger: Investment Tags</span>
      <input value={draftInv} onChange={e=>setDraftInv(e.target.value)} className="inp"/>
      <span className="lbl">Training Tags</span>
      <input value={draftGym} onChange={e=>setDraftGym(e.target.value)} className="inp"/>
      <span className="lbl">Study Tags</span>
      <input value={draftSkill} onChange={e=>setDraftSkill(e.target.value)} className="inp"/>
      <button onClick={resetToDefaults} className="pbtn" style={{background: "transparent", color: "#8E8E93", border: "1px dashed #C7C7CC", boxShadow: "none"}}>↺ Restore Defaults</button>
      {hasConfigChanges && <button onClick={saveSystemDefaults} className="pbtn" style={{marginTop: 14}}>💾 Save Configurations</button>}
    </div>
  </div>;
}

const DEFAULT_TABS = [
  { id: "activity", icon: "◎", label: "Journal", tags: "Deep work, Meetings, Commute, Break, Admin" },
  { id: "finance", icon: "₹", label: "Ledger" },
  { id: "gym", icon: "◈", label: "Training" },
  { id: "skills", icon: "◑", label: "Study" },
  { id: "settings", icon: "⚙", label: "Config" }
];

function App(){
  const [tabsStr] = useLocalStorage("sys_tabs", JSON.stringify(DEFAULT_TABS));
  const tabs = JSON.parse(tabsStr);
  const [tab, setTab] = useState("activity");

  const [hasVisited, setHasVisited] = useLocalStorage("has_visited_v7_final", "false");
  const [showWelcome, setShowWelcome] = useState(hasVisited !== "true");
  const [welcomeStep, setWelcomeStep] = useState(1);
  const [tempIdentity, setTempIdentity] = useState("");

  const finishWelcome = () => {
    if (tempIdentity.trim()) {
      localStorage.setItem("sys_ctx", JSON.stringify(tempIdentity));
    }
    setHasVisited("true");
    setShowWelcome(false);
  };

  const hr = new Date().getHours();
  const greet = hr < 12 ? "Good morning" : hr < 17 ? "Good afternoon" : "Good evening";

  return <div style={{maxWidth: 520, margin: "0 auto", padding: "0 20px 100px"}}>
    {showWelcome && (
      <div style={{position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(28,28,30,0.95)", backdropFilter: "blur(8px)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20}}>
        <div className="card welcome-card" style={{textAlign: "center", width: "100%", maxWidth: 400, padding: 30}}>
          {welcomeStep === 1 && (
            <div>
              <div style={{fontSize: 50, marginBottom: 10}}>✍️</div>
              <h2 style={{marginBottom: 12, fontSize:28}}>The Chronicles</h2>
              <p style={{fontSize: 15, color: "#8E8E93", marginBottom: 20, lineHeight: "1.5"}}>
                To provide strategic coaching, tell the AI who you are and what you aim to achieve.
              </p>
              <textarea className="inp" rows={4} placeholder="I am Krishna, a Senior Linguist..." value={tempIdentity} onChange={(e) => setTempIdentity(e.target.value)} />
              <button onClick={() => {if(tempIdentity.trim()) setWelcomeStep(2); else alert("Please introduce yourself first.");}} className="pbtn">Continue</button>
              <div style={{marginTop: 15}}>
                <button onClick={() => setWelcomeStep(2)} style={{background: "none", border: "none", color: "#5E5CE6", fontSize: 13, cursor: "pointer", textDecoration: "underline"}}>Skip for now</button>
                <p style={{fontSize: 10, color: "#8E8E93", marginTop: 6, fontStyle: "italic"}}>💡 You can always add this later in Config > 'Assistant Persona Rules' box.</p>
              </div>
            </div>
          )}
          {welcomeStep === 2 && (
            <div>
              <div style={{fontSize: 50, marginBottom: 10}}>🛡️</div>
              <h2 style={{marginBottom: 12, fontSize:24}}>Data Safety</h2>
              <div style={{textAlign:"left", fontSize:14, marginBottom:24, background:"#F2F2F7", padding:18, borderRadius:20}}>
                <p style={{marginBottom: 10}}><b>🔒 100% Private:</b> Data is stored only in your local browser storage.</p>
                <p><b>⚠️ Safety:</b> Local data can be lost. Export your archive frequently in <b>Config</b> to stay safe.</p>
              </div>
              <button onClick={() => setWelcomeStep(3)} className="pbtn">I Understand</button>
            </div>
          )}
          {welcomeStep === 3 && (
            <div>
              <div style={{fontSize: 50, marginBottom: 10}}>🚀</div>
              <h2 style={{marginBottom: 12, fontSize:24}}>Final Step</h2>
              <p style={{fontSize:15, textAlign:"center", marginBottom:20, color: "#8E8E93"}}>
                <b>Welcome to My Chronicles.</b><br/>Customize up to 6 tabs in <b>Config</b> to match your lifestyle.
              </p>
              <button onClick={finishWelcome} className="pbtn">Start Journey</button>
            </div>
          )}
        </div>
      </div>
    )}

    {/* MAIN HEADER: Only place for the greeting */}
    <div style={{padding: "40px 0 20px", textAlign:"left"}}>
      <h4 style={{fontSize: 12, color: "#5E5CE6", textTransform: "uppercase", letterSpacing: 2, marginBottom: 8}}>My Chronicles</h4>
      <h1 style={{fontSize: 34, marginBottom: 4}}>{greet}, Human.</h1>
      <p style={{fontSize: 16, color: "#8E8E93", fontWeight: 500}}>
        {new Date().toLocaleDateString("en-US", {weekday:"long", month:"long", day:"numeric"})}
      </p>
    </div>

    {/* CONTENT: Redundant greeting removed from here */}
    <div className="tab-content" key={tab}>
      {tabs.map(t => (
        <div key={t.id} style={{display: tab === t.id ? "block" : "none"}}>
          {t.id === "activity" ? <Activity/> : 
           t.id === "finance" ? <Finance/> :
           t.id === "gym" ? <Gym/> : 
           t.id === "skills" ? <Skills/> :
           t.id === "settings" ? <Settings/> : 
           <GenericLogger sectionId={t.id} title={t.label} icon={t.icon} tagsStr={t.tags} />}
        </div>
      ))}
    </div>

    <div className="nav">
      {tabs.map(t => (
        <button key={t.id} className="nb" onClick={() => setTab(t.id)}>
          <span style={{fontSize: 22, color: tab === t.id ? "#5E5CE6" : "#C7C7CC"}}>{t.icon}</span>
          <span style={{fontSize: 10, fontWeight: 700, color: tab === t.id ? "#5E5CE6" : "#C7C7CC"}}>{t.label}</span>
        </button>
      ))}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
